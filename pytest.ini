[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
# Files not yet converted to pytest — excluded from collection to avoid
# import-time side effects (sys.stdout replacement, QApplication init, etc.)
addopts =
    --ignore=tests/test_lazy_calc.py
    --ignore=tests/test_opal.py
    --ignore=tests/test_opal_v2.py
    --ignore=tests/test_opj_garbage.py
    --ignore=tests/test_all.py
    --ignore=tests/test_lbo.py
